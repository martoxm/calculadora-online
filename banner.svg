<svg width="1200" height="350" viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#007ACC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <!-- Efeito Glassmorphism -->
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="350" fill="url(#grad)"/>

  <!-- Caixa Glassmorphism -->
  <rect x="150" y="70" width="900" height="210" rx="25"
        fill="rgba(255,255,255,0.15)"
        stroke="rgba(255,255,255,0.35)"
        stroke-width="2"
        filter="url(#glass)"/>

  <!-- Ícone de calculadora -->
  <text x="220" y="205" font-size="120" fill="#ffffff" opacity="0.9">🧮</text>

  <!-- Título -->
  <text x="350" y="160"
        font-size="55"
        font-family="Segoe UI, Arial"
        fill="#ffffff"
        font-weight="700">
    Calculadora Online
  </text>

  <!-- Subtítulo -->
  <text x="350" y="215"
        font-size="32"
        font-family="Segoe UI, Arial"
        fill="#e5e5e5">
    HTML • CSS • JavaScript
  </text>

  <!-- Seu nome -->
  <text x="350" y="260"
        font-size="26"
        font-family="Segoe UI, Arial"
        fill="#cfcfcf">
    Desenvolvido por Marto
  </text>

</svg>
