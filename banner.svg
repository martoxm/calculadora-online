<svg width="1200" height="350" viewBox="0 0 1200 350" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#007ACC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <linearGradient id="iconFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>

    <!-- Efeito Glassmorphism -->
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#051322" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="350" fill="url(#grad)"/>

  <!-- Caixa Glassmorphism -->
  <rect x="150" y="70" width="900" height="210" rx="25"
      fill="#ffffff"
      fill-opacity="0.15"
      stroke="#ffffff"
      stroke-opacity="0.35"
        stroke-width="2"
        filter="url(#glass)"/>

  <!-- Ícone vetorial para manter alinhamento consistente -->
  <g transform="translate(245 108)" filter="url(#iconShadow)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="none" stroke="url(#iconFrame)" stroke-width="6"/>
    <line x1="18" y1="27" x2="92" y2="27" stroke="#9ed5ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="47" x2="92" y2="47" stroke="#9ed5ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="67" x2="92" y2="67" stroke="#9ed5ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="87" x2="92" y2="87" stroke="#9ed5ff" stroke-width="4" stroke-linecap="round"/>
    <line x1="58" y1="18" x2="58" y2="92" stroke="#8ab4f8" stroke-width="4"/>
    <circle cx="23" cy="27" r="7" fill="#ff4d88"/>
    <circle cx="37" cy="27" r="7" fill="#ff4d88"/>
    <circle cx="51" cy="27" r="7" fill="#ff4d88"/>
    <circle cx="81" cy="27" r="7" fill="#ff4d88"/>
    <circle cx="23" cy="47" r="7" fill="#ff9f43"/>
    <circle cx="37" cy="47" r="7" fill="#ff9f43"/>
    <circle cx="51" cy="47" r="7" fill="#ff9f43"/>
    <circle cx="81" cy="47" r="7" fill="#ff9f43"/>
    <circle cx="23" cy="67" r="7" fill="#f6d365"/>
    <circle cx="37" cy="67" r="7" fill="#f6d365"/>
    <circle cx="51" cy="67" r="7" fill="#f6d365"/>
    <circle cx="81" cy="67" r="7" fill="#f6d365"/>
    <circle cx="23" cy="87" r="7" fill="#4cd964"/>
    <circle cx="37" cy="87" r="7" fill="#4cd964"/>
    <circle cx="51" cy="87" r="7" fill="#4cd964"/>
    <circle cx="81" cy="87" r="7" fill="#4cd964"/>
  </g>

  <!-- Título -->
  <text x="365" y="162"
        font-size="55"
        font-family="Segoe UI, Arial"
        fill="#ffffff"
        font-weight="700">
    Calculadora Online
  </text>

  <!-- Subtítulo -->
  <text x="365" y="214"
        font-size="32"
        font-family="Segoe UI, Arial"
        fill="#e5e5e5">
    HTML • CSS • JavaScript
  </text>

  <!-- Seu nome -->
  <text x="365" y="260"
        font-size="26"
        font-family="Segoe UI, Arial"
        fill="#cfcfcf">
    Desenvolvido por Marto
  </text>

</svg>
